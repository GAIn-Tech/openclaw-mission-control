name: Build and Push Container Image

on:
  workflow_dispatch:
  push:
    branches:
      - cf-deploy
    paths:
      - 'backend/**'
      - '.github/workflows/build-image.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Cloudflare auth secrets are set
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Build backend image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t mission-control:${{ github.sha }} \
            -t mission-control:latest \
            .

      - name: Push immutable image tag
        run: npx wrangler containers push mission-control:${{ github.sha }}

      - name: Push latest image tag
        run: npx wrangler containers push mission-control:latest

      - name: Print image references for wrangler config
        run: |
          echo "Use one of these image references in wrangler.jsonc:"
          echo "registry.cloudflare.com/${CLOUDFLARE_ACCOUNT_ID}/mission-control:${{ github.sha }}"
          echo "registry.cloudflare.com/${CLOUDFLARE_ACCOUNT_ID}/mission-control:latest"
